services:
  nanazdb:
    image: postgres:17.4
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  uwubot:
    build: .
    depends_on:
      - nanazdb
    env_file:
      - .env
    restart: unless-stopped
    
volumes:
  pgdata: